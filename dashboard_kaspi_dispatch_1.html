<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kaspi Dispatch</title>
<style>
:root {
  --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
  --text: #e2e8f0; --muted: #64748b;
  --blue: #3b82f6; --green: #22c55e; --yellow: #f59e0b;
  --red: #ef4444; --purple: #a855f7; --cyan: #06b6d4;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; max-width:430px; margin:0 auto; }

/* HEADER */
.header { background:var(--card); border-bottom:1px solid var(--border); padding:0.8rem 1rem; position:sticky; top:0; z-index:100; }
.header-top { display:flex; align-items:center; justify-content:space-between; }
.header h1 { font-size:1rem; font-weight:700; color:#fff; }
.header p  { font-size:10px; color:var(--muted); margin-top:2px; }
.hright { display:flex; align-items:center; gap:8px; }
.dot { width:7px; height:7px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; display:inline-block; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.rtime { font-size:10px; color:var(--muted); }
.btnr { background:var(--border); border:1px solid #3a3d4a; color:var(--text); padding:5px 10px; border-radius:6px; cursor:pointer; font-size:11px; }

/* SUMMARY SCROLL */
.sum-scroll { display:flex; gap:8px; padding:0.8rem 1rem; overflow-x:auto; scrollbar-width:none; }
.sum-scroll::-webkit-scrollbar { display:none; }
.scard { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:0.7rem 0.9rem; min-width:100px; flex-shrink:0; }
.scard .lbl { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:4px; white-space:nowrap; }
.scard .val { font-size:1.6rem; font-weight:700; line-height:1; }
.scard .sub { font-size:9px; color:var(--muted); margin-top:3px; white-space:nowrap; }

/* FILTERS */
.filters { padding:0 1rem 0.8rem; display:flex; flex-direction:column; gap:8px; }
.search-wrap { position:relative; }
.finput { background:var(--card); border:1px solid var(--border); color:var(--text); padding:9px 12px 9px 34px; border-radius:8px; font-size:13px; outline:none; width:100%; }
.finput:focus { border-color:var(--blue); }
.search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); font-size:14px; color:var(--muted); pointer-events:none; }
.filter-row { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; }
.filter-row::-webkit-scrollbar { display:none; }
.fsel { background:var(--card); border:1px solid var(--border); color:var(--text); padding:7px 10px; border-radius:8px; font-size:12px; outline:none; cursor:pointer; flex-shrink:0; }
.cnt-row { display:flex; justify-content:space-between; align-items:center; }
.cnt { background:var(--border); color:var(--muted); font-size:10px; padding:3px 8px; border-radius:20px; }

/* CARD LIST */
.list { padding:0 1rem 1rem; display:flex; flex-direction:column; gap:10px; }

.tcard { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:0.9rem 1rem; }
.tcard-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.tcard-id { font-size:10px; color:var(--cyan); font-weight:600; }
.tcard-time { font-size:10px; color:var(--muted); }
.tcard-name { font-size:13px; font-weight:600; color:var(--text); line-height:1.3; margin-bottom:4px; }
.tcard-id2 { font-size:10px; color:var(--muted); margin-bottom:10px; }

.tcard-tags { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px; }
.badge { display:inline-block; padding:2px 7px; border-radius:4px; font-size:10px; font-weight:600; }
.b-open   { background:rgba(239,68,68,0.15);   color:var(--red); }
.b-done   { background:rgba(34,197,94,0.15);   color:var(--green); }
.b-prog   { background:rgba(245,158,11,0.15);  color:var(--yellow); }
.b-rep    { background:rgba(59,130,246,0.15);  color:var(--blue); }
.b-pick   { background:rgba(168,85,247,0.15);  color:var(--purple); }
.b-offl   { background:rgba(239,68,68,0.15);   color:var(--red); }
.b-cat    { background:rgba(6,182,212,0.12);   color:var(--cyan); }
.b-tier1  { background:rgba(245,158,11,0.2);   color:var(--yellow); }
.b-tier2  { background:rgba(100,116,139,0.12); color:var(--muted); }
.b-online { background:rgba(34,197,94,0.15);   color:var(--green); }
.b-offline{ background:rgba(239,68,68,0.15);   color:var(--red); }
.b-type   { background:rgba(168,85,247,0.12);  color:var(--purple); }

.tcard-info { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:10px; }
.info-item { background:rgba(255,255,255,0.03); border-radius:6px; padding:6px 8px; }
.info-lbl  { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:2px; }
.info-val  { font-size:12px; font-weight:500; color:var(--text); }

.tcard-issue { background:rgba(255,255,255,0.03); border-radius:6px; padding:7px 8px; margin-bottom:10px; font-size:11px; color:var(--muted); line-height:1.4; }
.issue-lbl { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:3px; }

.tcard-btns { display:flex; gap:8px; }
.link-btn { flex:1; display:flex; align-items:center; justify-content:center; gap:5px; padding:8px; border-radius:8px; font-size:12px; font-weight:500; text-decoration:none; transition:all 0.2s; }
.link-form { background:rgba(59,130,246,0.12); color:var(--blue); border:1px solid rgba(59,130,246,0.2); }
.link-form:hover { background:rgba(59,130,246,0.2); }
.link-ops  { background:rgba(34,197,94,0.12);  color:var(--green); border:1px solid rgba(34,197,94,0.2); }
.link-ops:hover  { background:rgba(34,197,94,0.2); }

/* LOADING / EMPTY */
.loading { display:flex; align-items:center; justify-content:center; padding:4rem 1rem; gap:1rem; flex-direction:column; }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty { text-align:center; padding:3rem 1rem; color:var(--muted); font-size:13px; }
.footer { font-size:10px; color:var(--muted); text-align:center; padding:0.5rem 1rem 1.5rem; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>🛠 Kaspi Dispatch</h1>
      <p>Monitoring tiket — Auto refresh 5 menit</p>
    </div>
    <div class="hright">
      <span class="dot"></span>
      <span class="rtime" id="rtime">Memuat...</span>
      <button class="btnr" onclick="loadData()">⟳</button>
    </div>
  </div>
</div>

<!-- SUMMARY SCROLL -->
<div class="sum-scroll" id="summary"></div>

<!-- FILTERS -->
<div class="filters">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="finput" id="srch" placeholder="Cari terminal / tiket / teknisi..." oninput="render()">
  </div>
  <div class="filter-row">
    <select class="fsel" id="fStatus" onchange="render()"><option value="">Semua Status</option></select>
    <select class="fsel" id="fCat"    onchange="render()"><option value="">Semua Kategori</option></select>
    <select class="fsel" id="fTier"   onchange="render()"><option value="">Semua Tier</option></select>
    <select class="fsel" id="fSort"   onchange="render()">
      <option value="ts-desc">Terbaru ↓</option>
      <option value="ts-asc">Terlama ↑</option>
      <option value="tier-asc">Tier 1 Dulu</option>
      <option value="pb-desc">PB% ↓</option>
    </select>
  </div>
  <div class="cnt-row">
    <span class="cnt" id="cnt">0 tiket</span>
  </div>
</div>

<!-- LIST -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <span style="color:var(--muted);font-size:13px">Memuat data...</span>
</div>
<div class="list" id="list" style="display:none"></div>
<div class="empty" id="empty" style="display:none">Tidak ada tiket yang cocok</div>
<p class="footer" id="footer"></p>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTekF1eTtWvBtMsaovaCFPiPfKaXrcsyki_mGne9Qk-9bxRQRpWvSQfaJz-sPE98yB-xMoWooiLQXzd/pub?gid=0&single=true&output=csv';

let DATA = [];

function parseCSV(text) {
  return text.trim().split('\n').map(line => {
    const cols = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    return cols;
  });
}

function validRow(r) {
  return r[0] && r[0].trim().startsWith('TS');
}

async function loadData() {
  document.getElementById('rtime').textContent = 'Memuat...';
  try {
    const text = await fetch(CSV_URL + '&t=' + Date.now()).then(r => r.text());
    DATA = parseCSV(text).slice(1).filter(validRow).map(r => ({
      id:       r[0].trim(),
      timestamp:r[1].trim(),
      termId:   r[2].trim(),
      termName: r[3].trim(),
      typeId:   r[4].trim(),
      tier:     r[5].trim(),
      loc:      r[6].trim(),
      ovo:      r[7].trim(),
      pb:       parseInt(r[8]) || 0,
      pbRaw:    r[8].trim(),
      cat:      r[9].trim(),
      issue:    r[10].trim(),
      tech:     r[11].trim(),
      link:     r[12].trim(),
      status:   r[13].trim(),
      opsApp:   r[14].trim()
    }));
    fillFilters();
    render();
    document.getElementById('rtime').textContent = new Date().toLocaleTimeString('id-ID');
  } catch(e) {
    document.getElementById('rtime').textContent = '⚠ Error';
    console.error(e);
  }
}

function fillFilters() {
  fillSel('fStatus', [...new Set(DATA.map(r=>r.status).filter(Boolean))].sort());
  fillSel('fCat',    [...new Set(DATA.map(r=>r.cat).filter(Boolean))].sort());
  fillSel('fTier',   [...new Set(DATA.map(r=>r.tier).filter(Boolean))].sort());
}

function fillSel(id, vals) {
  const sel = document.getElementById(id), cur = sel.value;
  const first = sel.options[0].outerHTML;
  sel.innerHTML = first;
  vals.forEach(v => { const o = document.createElement('option'); o.value=v; o.textContent=v; if(v===cur) o.selected=true; sel.appendChild(o); });
}

function statusBadge(s) {
  if (!s) return '<span class="badge b-cat">-</span>';
  const sl = s.toLowerCase();
  if (sl === 'open') return `<span class="badge b-open">🔴 Open</span>`;
  if (sl === 'done' || sl === 'closed') return `<span class="badge b-done">✅ Done</span>`;
  if (sl.includes('progress')) return `<span class="badge b-prog">🟡 Progress</span>`;
  return `<span class="badge b-cat">${s}</span>`;
}

function catBadge(c) {
  if (!c) return '-';
  const cl = c.toLowerCase();
  if (cl.includes('replenish')) return `<span class="badge b-rep">🔵 Replenish</span>`;
  if (cl.includes('pickup'))    return `<span class="badge b-pick">🟣 Pickup</span>`;
  if (cl.includes('offline'))   return `<span class="badge b-offl">🔴 Offline</span>`;
  return `<span class="badge b-cat">${c}</span>`;
}

function pbColor(pb) {
  if (pb >= 50) return 'var(--green)';
  if (pb >= 25) return 'var(--yellow)';
  return 'var(--red)';
}

function render() {
  const s   = document.getElementById('srch').value.toLowerCase();
  const st  = document.getElementById('fStatus').value;
  const cat = document.getElementById('fCat').value;
  const tr  = document.getElementById('fTier').value;
  const sv  = document.getElementById('fSort').value;

  let d = DATA.filter(r => {
    const ms  = !s   || r.termName.toLowerCase().includes(s) || r.id.toLowerCase().includes(s) || r.tech.toLowerCase().includes(s) || r.termId.toLowerCase().includes(s);
    const mst = !st  || r.status === st;
    const mc  = !cat || r.cat === cat;
    const mt  = !tr  || r.tier === tr;
    return ms && mst && mc && mt;
  });

  d.sort((a,b) => {
    if (sv === 'ts-desc')  return b.timestamp.localeCompare(a.timestamp);
    if (sv === 'ts-asc')   return a.timestamp.localeCompare(b.timestamp);
    if (sv === 'tier-asc') return parseInt(a.tier) - parseInt(b.tier);
    if (sv === 'pb-desc')  return b.pb - a.pb;
    return 0;
  });

  // Summary
  const open    = d.filter(r=>r.status.toLowerCase()==='open').length;
  const done    = d.filter(r=>r.status.toLowerCase()==='done'||r.status.toLowerCase()==='closed').length;
  const replen  = d.filter(r=>r.cat.toLowerCase().includes('replenish')).length;
  const pickup  = d.filter(r=>r.cat.toLowerCase().includes('pickup')).length;
  const offline = d.filter(r=>r.cat.toLowerCase().includes('offline')).length;
  const tier1   = d.filter(r=>r.tier==='1').length;

  document.getElementById('summary').innerHTML = [
    {l:'Total',      v:d.length, c:'var(--blue)',   s:`dari ${DATA.length}`},
    {l:'Open',       v:open,     c:'var(--red)',    s:'belum selesai'},
    {l:'Done',       v:done,     c:'var(--green)',  s:'selesai'},
    {l:'Replenish',  v:replen,   c:'var(--blue)',   s:'tiket'},
    {l:'Pickup',     v:pickup,   c:'var(--purple)', s:'tiket'},
    {l:'Offline',    v:offline,  c:'var(--yellow)', s:'tiket'},
    {l:'Tier 1',     v:tier1,    c:'var(--yellow)', s:'prioritas'},
  ].map(x=>`<div class="scard"><div class="lbl">${x.l}</div><div class="val" style="color:${x.c}">${x.v}</div><div class="sub">${x.s}</div></div>`).join('');

  document.getElementById('loading').style.display = 'none';
  document.getElementById('cnt').textContent = d.length + ' tiket';

  if (!d.length) {
    document.getElementById('list').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
    return;
  }
  document.getElementById('list').style.display = 'flex';
  document.getElementById('empty').style.display = 'none';

  document.getElementById('list').innerHTML = d.map(r => `
    <div class="tcard">
      <div class="tcard-top">
        <span class="tcard-id">${r.id}</span>
        <span class="tcard-time">${r.timestamp}</span>
      </div>
      <div class="tcard-name">${r.termName||'-'}</div>
      <div class="tcard-id2">${r.termId}</div>

      <div class="tcard-tags">
        ${statusBadge(r.status)}
        ${catBadge(r.cat)}
        <span class="badge ${r.tier==='1'?'b-tier1':'b-tier2'}">Tier ${r.tier}</span>
        <span class="badge b-type">${r.typeId||'-'}</span>
        <span class="badge ${r.ovo.toLowerCase()==='online'?'b-online':'b-offline'}">${r.ovo||'-'}</span>
      </div>

      <div class="tcard-info">
        <div class="info-item">
          <div class="info-lbl">Lokasi</div>
          <div class="info-val">${r.loc||'-'}</div>
        </div>
        <div class="info-item">
          <div class="info-lbl">Current PB%</div>
          <div class="info-val" style="color:${pbColor(r.pb)}">${r.pbRaw||'-'}</div>
        </div>
        <div class="info-item">
          <div class="info-lbl">Teknisi</div>
          <div class="info-val">${r.tech||'-'}</div>
        </div>
        <div class="info-item">
          <div class="info-lbl">Issue</div>
          <div class="info-val" style="font-size:11px">${r.issue||'-'}</div>
        </div>
      </div>

      <div class="tcard-btns">
        ${r.link   ? `<a href="${r.link}"   target="_blank" class="link-btn link-form">📋 Form</a>` : ''}
        ${r.opsApp ? `<a href="${r.opsApp}" target="_blank" class="link-btn link-ops">⚡ Ops App</a>` : ''}
      </div>
    </div>
  `).join('');

  document.getElementById('footer').textContent = 'Update: ' + new Date().toLocaleString('id-ID');
}

loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
